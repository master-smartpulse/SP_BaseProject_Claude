# CI do kit e do projeto derivado (Constitution, Princípio 7).
# - Job "kit-scripts": valida os scripts bash do próprio kit (sempre roda).
# - Job "app": lint + typecheck + testes + build do projeto — ativa automaticamente
#   quando existir package.json na raiz. Ajuste os comandos à estrutura do seu
#   projeto (ex.: monorepo pnpm: rode por workspace ou via turbo).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  kit-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          command -v shellcheck >/dev/null 2>&1 || { sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck; }
          shellcheck -S warning scripts/bash/*.sh scripts/bash/hooks/*.sh scripts/tests/*.sh
      - name: Kit self-tests
        run: bash scripts/tests/run-tests.sh

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect app
        id: detect
        run: |
          if [ -f package.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 22
      - name: Install pnpm
        if: steps.detect.outputs.present == 'true'
        # corepack respeita o campo "packageManager" do package.json quando presente
        run: |
          corepack enable
          pnpm --version >/dev/null 2>&1 || corepack prepare pnpm@latest --activate
      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml ausente — instalando sem lockfile (commite o lockfile para builds reprodutíveis)"
            pnpm install --no-frozen-lockfile
          fi
      - name: Lint
        if: steps.detect.outputs.present == 'true'
        run: pnpm run --if-present lint
      - name: Typecheck
        if: steps.detect.outputs.present == 'true'
        run: |
          if grep -q '"typecheck"' package.json; then
            pnpm run typecheck
          elif [ -f tsconfig.json ]; then
            pnpm exec tsc --noEmit
          else
            echo "sem script typecheck nem tsconfig.json na raiz — pulando (monorepo: exponha um script typecheck na raiz)"
          fi
      - name: Tests
        if: steps.detect.outputs.present == 'true'
        run: pnpm run --if-present test
      - name: Build
        if: steps.detect.outputs.present == 'true'
        run: pnpm run --if-present build
      - name: No app yet
        if: steps.detect.outputs.present == 'false'
        run: echo "package.json ausente — job de app inativo até o projeto ter código."
